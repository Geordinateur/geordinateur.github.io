          function sendEmail() {
            Email.send({

              Username: "username",
              Password: "password",
              To: 'recipient@example.com',
              From: "sender@example.com",

            })
              .then(function (message) {

          </script>
          <button onclick="sendEmail()">Send Email</button> <!-- Button to trigger email sending -->
