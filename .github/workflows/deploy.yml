name: Build and Deploy Resume

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Copy generated files to server via SCP
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "$SSH_KEY" > key.pem
          ls -all .
          chmod 600 key.pem
          scp -o StrictHostKeyChecking=no -i key.pem index.html -r css images ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/index/
